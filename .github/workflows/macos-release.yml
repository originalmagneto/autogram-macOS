name: macOS Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.2.3). Leave empty for current ref."
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="$(git describe --tags --abbrev=0)"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "Unable to resolve release tag."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Checkout release tag (manual runs)
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: git checkout "refs/tags/${{ steps.resolve_tag.outputs.tag }}"

      - name: Set up JDK 24 + JavaFX
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "24"
          java-package: "jdk+fx"

      - name: Cache Maven repository and JDK cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            target/jdkCache
          key: macos-release-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            macos-release-${{ runner.os }}-

      - name: Disable macOS signing in CI
        shell: bash
        run: |
          set -euo pipefail
          sed -i.bak 's/^mac.sign=.*/mac.sign=0/' src/main/resources/digital/slovensko/autogram/build.properties

      - name: Build macOS packages
        run: ./mvnw -B -C -V -Psystem-jdk -DskipTests package

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd target
          shasum -a 256 *.dmg *.pkg > SHA256SUMS.txt

      - name: Create release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          {
            echo "## Autogram ${TAG}"
            echo
            echo "### macOS installers"
            echo
            echo "- Download the \`.dmg\` for drag-and-drop install to Applications."
            echo "- \`.pkg\` installer is also attached."
            echo
            echo "### Verification"
            echo
            echo "- Check attached \`SHA256SUMS.txt\`."
          } > release_notes.md
          {
            echo 'body<<EOF'
            cat release_notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: Autogram ${{ steps.resolve_tag.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            target/*.dmg
            target/*.pkg
            target/SHA256SUMS.txt
