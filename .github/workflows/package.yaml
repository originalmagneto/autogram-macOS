name: Package

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  macos:
    environment: packaging
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update version in pom from pushed tag
        if: startsWith(github.ref, 'refs/tags/')
        run: ./mvnw versions:set -DnewVersion=${GITHUB_REF_NAME#v}
        shell: bash

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: "24.0.1+11"
          distribution: "liberica"
          java-package: "jdk+fx"
          architecture: "x64"

      - name: Cache local Maven repository and JDK cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.m2/repository
            target/jdkCache
          key: macos-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            macos-maven-


      - name: Configure macOS signing mode
        shell: bash
        run: |
          if [[ -n "${{ secrets.APPLE_DEVELOPER_IDENTITY }}" && -n "${{ secrets.APPLE_KEYCHAIN_PATH }}" ]]; then
            echo "Apple signing secrets detected, enabling package signing."
            sed -i.bak 's/^mac.sign=.*/mac.sign=1/' src/main/resources/digital/slovensko/autogram/build.properties
            echo "APPLE_DEVELOPER_IDENTITY=${{ secrets.APPLE_DEVELOPER_IDENTITY }}" >> "$GITHUB_ENV"
            echo "APPLE_KEYCHAIN_PATH=${{ secrets.APPLE_KEYCHAIN_PATH }}" >> "$GITHUB_ENV"
          else
            echo "Apple signing secrets not found, building unsigned installers."
            sed -i.bak 's/^mac.sign=.*/mac.sign=0/' src/main/resources/digital/slovensko/autogram/build.properties
          fi

      - name: Package with Maven
        run: ./mvnw -B -C -V clean package -P system-jdk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v "^${TAG}$" | sort -V | tail -1 || true)"

          {
            echo "## 🍎 macOS Improvements Release ${TAG}"
            echo
            echo "### Changes in this release:"
            echo
            if [[ -n "${PREV_TAG}" ]]; then
              git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s"
            else
              git log "${TAG}" --pretty=format:"- %s"
            fi
            echo
            echo
            echo "### 📦 Installation"
            echo
            echo "- **macOS Package (.pkg)**: Download and double-click to install"
            echo "- **macOS Disk Image (.dmg)**: Download, mount, and drag to Applications"
            echo
            echo "### 🛡 Gatekeeper (Unsigned Builds)"
            echo
            echo "If macOS blocks first launch:"
            echo "1. Finder -> Applications -> right click **Autogram.app** -> **Open**"
            echo "2. Or System Settings -> Privacy & Security -> **Open Anyway**"
            echo
            echo "Terminal fallback:"
            echo "\`xattr -dr com.apple.quarantine \"/Applications/Autogram.app\"\`"
            echo "\`codesign --force --deep --sign - --timestamp=none \"/Applications/Autogram.app\"\`"
            echo "\`open -a \"/Applications/Autogram.app\"\`"
            echo
            echo "### 🔧 Technical Details"
            echo
            echo "- **Build date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- **Commit SHA**: ${GITHUB_SHA}"
          } > release_notes.md


      - name: Create release if tag pushed
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Autogram ${{ github.ref_name }} - macOS Improvements"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            target/*.pkg
            target/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
